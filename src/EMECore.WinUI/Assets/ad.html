<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <title>Anúncio</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body {
            width: 100%; height: 100%;
            background: #161719;
            font-family: 'Segoe UI', sans-serif;
            overflow: hidden;
            color: white;
        }
        #ad-container {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 4px;
        }
        .ad-label {
            font-size: 9px;
            color: #6B7280;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 4px;
            text-align: center;
        }
        .ad-frame {
            background: #2A2D31;
            border: 1px solid #4C5060;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            transition: all 0.2s ease;
        }
        .ad-placeholder {
            color: #E8E9EB;
            font-size: 10px;
            text-align: center;
            padding: 8px;
            line-height: 1.4;
        }
        .ad-placeholder .icon {
            font-size: 20px;
            margin-bottom: 4px;
            display: block;
        }
        /* Expandido (≥150px) */
        @media (min-width: 150px) {
            .ad-frame { width: 160px; height: 300px; }
            .ad-placeholder .icon { font-size: 24px; }
            .ad-placeholder { font-size: 11px; }
        }
        /* Recolhido (<150px) */
        @media (max-width: 149px) {
            .ad-frame { width: calc(100% - 8px); height: 80px; }
            .ad-placeholder .icon { font-size: 16px; }
            .ad-placeholder { font-size: 9px; padding: 4px; }
            .ad-label { font-size: 8px; }
        }
    </style>
</head>
<body>
    <div id="ad-container">
        <div class="ad-label">Publicidade</div>
        <div class="ad-frame">
            <div class="ad-placeholder">
                <span class="icon">&#9733;</span>
                Espaço reservado para anúncio
            </div>
        </div>
    </div>

    <!--
    ╔══════════════════════════════════════════════════════════╗
    ║  ADSENSE CODE — Descomente e insira seu publisher ID   ║
    ╠══════════════════════════════════════════════════════════╣
    ║  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-XXXXXXXXXX" crossorigin="anonymous"></script>
    ║  <ins class="adsbygoogle"
    ║       style="display:inline-block;width:160px;height:300px"
    ║       data-ad-slot="XXXXXXXXXX"></ins>
    ║  <script>(adsbygoogle = window.adsbygoogle || []).push({});</script>
    ╚══════════════════════════════════════════════════════════╝
    -->

    <script>
        // Resize automático baseado na largura do container
        function adjustLayout() {
            var container = document.getElementById('ad-container');
            var frame = document.querySelector('.ad-frame');
            if (!container || !frame) return;

            var w = container.clientWidth;
            if (w >= 150) {
                frame.style.width = '160px';
                frame.style.height = '300px';
            } else {
                frame.style.width = Math.max(w - 8, 40) + 'px';
                frame.style.height = '80px';
            }
        }

        window.addEventListener('resize', adjustLayout);
        adjustLayout();
    </script>
</body>
</html>
